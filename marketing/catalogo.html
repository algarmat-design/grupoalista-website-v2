<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Productos | Alista Marketing Services</title>
  <meta name="description" content="Explora más de 1,400 productos promocionales personalizados. Busca por categoría, agrega a cotización y recibe tu propuesta en 24 horas.">
  <link rel="icon" type="image/png" href="../assets/images/logo-marketing.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Playfair+Display:ital,wght@1,700&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    /* ── VARIABLES ────────────────────────────────────────── */
    :root {
      --ob:     #1C1C2E;
      --wine:   #8B1A2B;
      --wine-l: #A62D42;
      --wine-d: #5C0E1F;
      --gold:   #C9A84C;
      --ivory:  #FAF7F2;
      --pearl:  #F0EDE8;
      --cream:  #F5F0E8;
      --slate:  #6B6B7B;
      --grey:   #A8A3A0;
      --ink:    #111111;
      --border: rgba(17,17,17,0.09);
      --r:      8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ivory); color: var(--ink);
      overflow-x: hidden; min-height: 100vh;
    }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* ── NAV ─────────────────────────────────────────────── */
    #cat-nav {
      position: sticky; top: 0; z-index: 200;
      height: 58px;
      background: rgba(28,28,46,0.97);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 4vw, 2.5rem);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .cat-nav-left { display: flex; align-items: center; gap: 1.2rem; }
    .cat-nav-logo img { height: 32px; width: auto; }
    .cat-nav-back {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(250,247,242,0.55);
      transition: color 0.2s;
    }
    .cat-nav-back:hover { color: var(--gold); }
    .cat-nav-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }
    .cat-nav-title {
      font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(250,247,242,0.9);
    }
    /* Cart badge in nav */
    .cat-nav-cotizar {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #fff; background: var(--wine); border-radius: 6px;
      padding: 0.45rem 0.85rem;
      transition: background 0.2s;
      position: relative;
    }
    .cat-nav-cotizar:hover { background: var(--wine-l); }
    #nav-badge {
      background: var(--gold); color: var(--ob);
      font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 800;
      width: 17px; height: 17px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
    }
    #nav-badge.visible { display: inline-flex; }

    /* ── FILTER BAR ──────────────────────────────────────── */
    #filter-bar {
      position: sticky; top: 58px; z-index: 150;
      background: var(--ivory);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem clamp(1rem, 4vw, 2.5rem);
    }
    .filter-search-row {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.6rem;
    }
    .filter-search-wrap {
      position: relative; flex: 1;
    }
    .filter-search-wrap svg {
      position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
      color: var(--slate); pointer-events: none;
    }
    #cat-search {
      width: 100%; padding: 0.65rem 0.85rem 0.65rem 2.6rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink);
      background: #fff; border: 1.5px solid var(--border); border-radius: var(--r);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    #cat-search:focus {
      border-color: var(--wine);
      box-shadow: 0 0 0 3px rgba(139,26,43,0.08);
    }
    #cat-search::placeholder { color: var(--grey); }
    .filter-count {
      font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 700;
      color: var(--slate); white-space: nowrap;
    }
    /* Category pills row */
    .filter-pills-row {
      display: flex; gap: 0.4rem;
      flex-wrap: wrap;
      padding-bottom: 0.5rem;
    }
    .cat-pill {
      padding: 0.35rem 0.85rem;
      font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.04em;
      border: 1.5px solid var(--border); border-radius: 30px;
      color: var(--slate); background: #fff;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .cat-pill:hover { border-color: var(--wine); color: var(--wine); }
    .cat-pill.active {
      border-color: var(--wine); background: var(--wine); color: #fff;
    }

    /* ── MAIN LAYOUT ─────────────────────────────────────── */
    #cat-main {
      max-width: 1640px; margin: 0 auto;
      padding: 2rem clamp(1rem, 4vw, 2.5rem) 4rem;
    }
    #result-label {
      font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600;
      color: var(--slate); margin-bottom: 1.2rem;
    }
    #result-label strong { color: var(--ink); }

    /* ── PRODUCT GRID ────────────────────────────────────── */
    #cat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.1rem;
    }
    @media (max-width: 1400px) { #cat-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (max-width: 1100px) { #cat-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 820px)  { #cat-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px)  { #cat-grid { grid-template-columns: repeat(2, 1fr); } }

    /* ── PRODUCT CARD ────────────────────────────────────── */
    .prod-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex; flex-direction: column;
    }
    .prod-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.1);
    }
    .prod-img-wrap { position: relative; background: var(--cream); }
    .prod-img-wrap img {
      width: 100%; height: 180px; object-fit: cover;
      display: block; transition: opacity 0.3s;
    }
    .prod-img-wrap img[data-src] { opacity: 0; }
    .prod-img-wrap img.loaded { opacity: 1; }
    @media (max-width: 560px) { .prod-img-wrap img { height: 140px; } }
    .prod-cat-badge {
      position: absolute; top: 0.5rem; left: 0.5rem;
      font-family: 'Inter', sans-serif; font-size: 0.57rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--wine); color: #fff;
      padding: 0.18rem 0.5rem; border-radius: 20px;
    }
    .prod-body {
      padding: 0.75rem 0.8rem 0.85rem;
      display: flex; flex-direction: column; gap: 0.25rem; flex: 1;
    }
    .prod-name {
      font-size: 0.8rem; font-weight: 600; color: var(--ink);
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .prod-sku {
      font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
      color: var(--slate);
    }
    .prod-action { margin-top: auto; padding-top: 0.5rem; }
    .prod-quote-btn {
      width: 100%; padding: 0.5rem 0.6rem;
      font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--wine); border: 1.5px solid var(--wine); border-radius: 5px;
      transition: background 0.15s, color 0.15s;
    }
    .prod-quote-btn:hover { background: var(--wine); color: #fff; }
    .prod-quote-btn.added {
      background: rgba(139,26,43,0.07); color: var(--wine);
      cursor: default;
    }

    /* ── EMPTY STATE ────────────────────────────────────── */
    #cat-empty {
      grid-column: 1 / -1;
      text-align: center; padding: 5rem 1rem;
      color: var(--slate); display: none;
    }
    #cat-empty h3 { font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; }
    #cat-empty a { color: var(--wine); cursor: pointer; text-decoration: underline; }

    /* ── PAGINATION ─────────────────────────────────────── */
    #cat-pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 0.35rem; margin-top: 2.5rem; flex-wrap: wrap;
    }
    .pg-btn {
      min-width: 36px; height: 36px; padding: 0 0.6rem;
      font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: 6px;
      color: var(--slate); background: #fff;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--wine); color: var(--wine); }
    .pg-btn.active { background: var(--wine); border-color: var(--wine); color: #fff; }
    .pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .pg-ellipsis {
      font-family: 'Inter', sans-serif; font-size: 0.8rem;
      color: var(--slate); padding: 0 0.2rem;
    }

    /* ── MODAL BACKDROP ─────────────────────────────────── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(28,28,46,0.55); backdrop-filter: blur(4px);
    }
    .modal-backdrop.open { display: block; }

    /* ── PRODUCT MODAL ──────────────────────────────────── */
    #product-modal {
      display: none; position: fixed; z-index: 400;
      top: 50%; left: 50%; transform: translate(-50%, -48%) scale(0.96);
      width: min(520px, 94vw);
      background: #fff; border-radius: 14px;
      box-shadow: 0 24px 72px rgba(0,0,0,0.22);
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.22,1,0.36,1), opacity 0.28s;
      opacity: 0;
    }
    #product-modal.open {
      display: block;
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    .pm-close {
      position: absolute; top: 0.85rem; right: 0.85rem;
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--pearl); color: var(--slate);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s; z-index: 1;
    }
    .pm-close:hover { background: var(--wine); color: #fff; }
    .pm-img-row {
      display: grid; grid-template-columns: 140px 1fr; gap: 0;
    }
    .pm-img {
      width: 140px; height: 160px; object-fit: cover;
      background: var(--cream);
    }
    .pm-info {
      padding: 1.3rem 1.3rem 1rem;
      display: flex; flex-direction: column; gap: 0.45rem;
      background: var(--pearl);
    }
    .pm-cat-badge {
      font-family: 'Inter', sans-serif; font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--wine); background: rgba(139,26,43,0.1);
      padding: 0.2rem 0.5rem; border-radius: 20px;
      display: inline-block; width: fit-content;
    }
    .pm-name {
      font-family: 'Inter', sans-serif; font-weight: 800;
      font-size: 0.92rem; line-height: 1.4; color: var(--ink);
    }
    .pm-sku {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--slate);
    }
    .pm-form { padding: 1.3rem 1.4rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .pm-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .pm-field label {
      font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.04em; color: var(--slate);
    }
    .pm-field input, .pm-field textarea {
      width: 100%; padding: 0.6rem 0.85rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--ink);
      background: var(--ivory); border: 1.5px solid var(--border); border-radius: 6px;
      outline: none; transition: border-color 0.2s;
    }
    .pm-field input:focus, .pm-field textarea:focus { border-color: var(--wine); }
    .pm-field textarea { resize: vertical; min-height: 60px; }
    .pm-qty-row { display: flex; align-items: center; gap: 0.5rem; }
    .pm-qty-btn {
      width: 32px; height: 32px; border-radius: 5px;
      border: 1.5px solid var(--border);
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      color: var(--slate); transition: border-color 0.15s, color 0.15s;
    }
    .pm-qty-btn:hover { border-color: var(--wine); color: var(--wine); }
    .pm-qty-val {
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700;
      width: 3.8rem; text-align: center; color: var(--ink);
      border: 1.5px solid var(--border); border-radius: 5px;
      padding: 0.3rem; outline: none; background: var(--ivory);
      -moz-appearance: textfield;
    }
    .pm-qty-val::-webkit-inner-spin-button,
    .pm-qty-val::-webkit-outer-spin-button { opacity: 0; }
    .pm-qty-val:focus { border-color: var(--wine); }
    .pm-add-btn {
      width: 100%; padding: 0.9rem;
      font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #fff; background: var(--wine); border-radius: 7px;
      transition: background 0.2s, transform 0.15s;
    }
    .pm-add-btn:hover { background: var(--wine-l); transform: translateY(-1px); }
    .pm-add-btn.added { background: #10B981; transform: none; }

    /* ── CART FAB ────────────────────────────────────────── */
    .cart-fab {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 250;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--wine);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      box-shadow: 0 4px 20px rgba(139,26,43,0.4);
      transition: background 0.2s, transform 0.2s;
    }
    .cart-fab:hover { background: var(--wine-l); transform: scale(1.06); }
    .cart-fab-badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--gold); color: var(--ob);
      font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 800;
      width: 18px; height: 18px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      border: 2px solid #fff;
    }
  </style>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────── -->
<nav id="cat-nav">
  <div class="cat-nav-left">
    <a class="cat-nav-logo" href="../marketing.html">
      <img src="../assets/images/logo-marketing.png" alt="Alista Marketing Services">
    </a>
    <div class="cat-nav-sep"></div>
    <span class="cat-nav-title">Catálogo</span>
  </div>
  <div style="display:flex;align-items:center;gap:1rem;">
    <a class="cat-nav-back" href="../marketing.html">← Inicio</a>
    <a class="cat-nav-cotizar" href="cotizar.html" id="nav-cotizar-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      Cotizar
      <span id="nav-badge"></span>
    </a>
  </div>
</nav>

<!-- ── FILTER BAR ─────────────────────────────────────── -->
<div id="filter-bar">
  <div class="filter-search-row">
    <div class="filter-search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="cat-search" placeholder="Buscar producto por nombre o SKU…" autocomplete="off">
    </div>
    <span class="filter-count" id="result-label"></span>
  </div>
  <div class="filter-pills-row" id="cat-pills">
    <button class="cat-pill active" data-cat="todos">Todos</button>
    <!-- Pills injected by JS -->
  </div>
</div>

<!-- ── CATALOG MAIN ──────────────────────────────────── -->
<div id="cat-main">
  <div id="cat-grid">
    <div id="cat-empty">
      <h3>Sin resultados</h3>
      <p>No encontramos productos para tu búsqueda. <a onclick="clearSearch()">Limpiar filtros</a></p>
    </div>
  </div>
  <div id="cat-pagination"></div>
</div>

<!-- ── MODAL BACKDROP ────────────────────────────────── -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal()"></div>

<!-- ── PRODUCT MODAL ─────────────────────────────────── -->
<div id="product-modal" role="dialog" aria-modal="true" aria-label="Agregar a cotización">
  <button class="pm-close" onclick="closeModal()" aria-label="Cerrar">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
  </button>
  <div class="pm-img-row">
    <img class="pm-img" id="pm-img" src="" alt="">
    <div class="pm-info">
      <span class="pm-cat-badge" id="pm-cat"></span>
      <div class="pm-name" id="pm-name"></div>
      <div class="pm-sku" id="pm-sku"></div>
    </div>
  </div>
  <div class="pm-form">
    <div class="pm-field">
      <label>Cantidad aproximada</label>
      <div class="pm-qty-row">
        <button class="pm-qty-btn" type="button" onclick="modalQty(-1)">−</button>
        <input type="number" class="pm-qty-val" id="pm-qty" min="1" max="9999" value="1">
        <button class="pm-qty-btn" type="button" onclick="modalQty(1)">+</button>
      </div>
    </div>
    <div class="pm-field">
      <label for="pm-color">Color (opcional)</label>
      <input type="text" id="pm-color" placeholder="Ej. Azul marino, negro, rojo...">
    </div>
    <div class="pm-field">
      <label for="pm-specs">Especificaciones adicionales (opcional)</label>
      <textarea id="pm-specs" placeholder="Ej. Logo a 1 tinta, talla L, entrega urgente…"></textarea>
    </div>
    <button class="pm-add-btn" id="pm-add-btn" type="button" onclick="confirmAddToCart()">
      + Añadir a cotización
    </button>
  </div>
</div>

<!-- ── CART FAB ──────────────────────────────────────── -->
<a class="cart-fab" id="cart-fab" href="cotizar.html" aria-label="Ver cotización">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
  <span class="cart-fab-badge" id="fab-badge"></span>
</a>

<!-- ── DATA ─────────────────────────────────────────── -->
<script src="../assets/js/marketing-catalog.js"></script>

<!-- ── APP JS ───────────────────────────────────────── -->
<script>
(function () {
  'use strict';

  var PAGE_SIZE = 48;
  var state = { category: 'todos', search: '', page: 1 };
  var cart = [];
  try { cart = JSON.parse(localStorage.getItem('mkt-cart') || '[]'); } catch (e) { cart = []; }

  function saveCart() {
    try { localStorage.setItem('mkt-cart', JSON.stringify(cart)); } catch (e) {}
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Category pills ────────────────────────────────────
  var catLabelMap = {};
  CATEGORIES.forEach(function (cat) {
    catLabelMap[cat.slug] = cat.label;
    var btn = document.createElement('button');
    btn.className = 'cat-pill';
    btn.dataset.cat = cat.slug;
    btn.textContent = cat.icon + ' ' + cat.label;
    document.getElementById('cat-pills').appendChild(btn);
  });

  // ── Lazy image loading ────────────────────────────────
  var imgObs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) {
        var img = e.target;
        if (img.dataset.src) {
          img.src = img.dataset.src;
          img.addEventListener('load', function () { img.classList.add('loaded'); }, { once: true });
          img.addEventListener('error', function () { img.classList.add('loaded'); }, { once: true });
        }
        imgObs.unobserve(img);
      }
    });
  }, { rootMargin: '400px' });

  // ── Filtering ─────────────────────────────────────────
  function getFiltered() {
    var q = state.search;
    return CATALOG.filter(function (p) {
      var matchCat = state.category === 'todos' || p.category === state.category;
      var matchSearch = !q ||
        p.name.toLowerCase().indexOf(q) !== -1 ||
        p.sku.toLowerCase().indexOf(q) !== -1;
      return matchCat && matchSearch;
    });
  }

  // ── Render catalog ────────────────────────────────────
  function renderCatalog() {
    var filtered = getFiltered();
    var totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    if (state.page > totalPages) state.page = totalPages;
    var start = (state.page - 1) * PAGE_SIZE;
    var items = filtered.slice(start, start + PAGE_SIZE);

    var grid = document.getElementById('cat-grid');
    var empty = document.getElementById('cat-empty');

    if (items.length === 0) {
      grid.innerHTML = '';
      grid.appendChild(empty);
      empty.style.display = 'block';
      document.getElementById('cat-pagination').innerHTML = '';
      document.getElementById('result-label').textContent = '0 productos';
      return;
    }
    empty.style.display = 'none';

    var html = '';
    items.forEach(function (p) {
      var imgPath = '../assets/images/marketing/' + p.category + '/' + p.img;
      var catLabel = catLabelMap[p.category] || p.category;
      var inCart = cart.some(function (c) { return c.id === p.id; });
      html +=
        '<div class="prod-card">' +
        '<div class="prod-img-wrap">' +
        '<img data-src="' + imgPath + '" alt="' + escHtml(p.name) + '">' +
        '<span class="prod-cat-badge">' + escHtml(catLabel) + '</span>' +
        '</div>' +
        '<div class="prod-body">' +
        '<div class="prod-name">' + escHtml(p.name) + '</div>' +
        '<div class="prod-sku">' + escHtml(p.sku) + '</div>' +
        '<div class="prod-action">' +
        '<button class="prod-quote-btn' + (inCart ? ' added' : '') + '" ' +
        "onclick=\"addToCart('" + p.id + "')\" " +
        'data-pid="' + escHtml(p.id) + '">' +
        (inCart ? '✓ Agregado' : '+ Cotizar') +
        '</button>' +
        '</div></div></div>';
    });
    grid.innerHTML = html;
    grid.appendChild(empty);

    // Observe lazy images
    grid.querySelectorAll('img[data-src]').forEach(function (img) { imgObs.observe(img); });

    // Result label
    var catName = state.category === 'todos' ? 'todos los productos' : (catLabelMap[state.category] || state.category);
    document.getElementById('result-label').innerHTML =
      '<strong>' + filtered.length + '</strong> productos' +
      (state.category !== 'todos' ? ' en ' + catName : '') +
      ' · Pág. ' + state.page + '/' + totalPages;

    renderPagination(totalPages);
  }

  // ── Pagination ────────────────────────────────────────
  function renderPagination(totalPages) {
    var pg = document.getElementById('cat-pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    var cur = state.page;
    var html = '';
    html += '<button class="pg-btn" onclick="goPage(' + (cur - 1) + ')"' + (cur === 1 ? ' disabled' : '') + '>←</button>';
    var pages = buildPageRange(cur, totalPages);
    pages.forEach(function (p) {
      if (p === '…') {
        html += '<span class="pg-ellipsis">…</span>';
      } else {
        html += '<button class="pg-btn' + (p === cur ? ' active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
      }
    });
    html += '<button class="pg-btn" onclick="goPage(' + (cur + 1) + ')"' + (cur === totalPages ? ' disabled' : '') + '>→</button>';
    pg.innerHTML = html;
  }

  function buildPageRange(cur, total) {
    if (total <= 7) {
      var arr = [];
      for (var i = 1; i <= total; i++) arr.push(i);
      return arr;
    }
    var result = [1];
    if (cur > 3) result.push('…');
    var lo = Math.max(2, cur - 1), hi = Math.min(total - 1, cur + 1);
    for (var j = lo; j <= hi; j++) result.push(j);
    if (cur < total - 2) result.push('…');
    result.push(total);
    return result;
  }

  window.goPage = function (n) {
    var filtered = getFiltered();
    var totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    n = Math.max(1, Math.min(totalPages, n));
    if (n === state.page) return;
    state.page = n;
    renderCatalog();
    document.getElementById('filter-bar').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // ── Modal ─────────────────────────────────────────────
  var modalProduct = null;
  var modalQtyVal = 1;

  window.addToCart = function (productId) {
    var product = CATALOG.find(function (p) { return p.id === productId; });
    if (!product) return;
    modalProduct = product;
    modalQtyVal = 1;

    var catLabel = catLabelMap[product.category] || product.category;
    var imgPath = '../assets/images/marketing/' + product.category + '/' + product.img;

    document.getElementById('pm-img').src = imgPath;
    document.getElementById('pm-img').alt = product.name;
    document.getElementById('pm-cat').textContent = catLabel;
    document.getElementById('pm-name').textContent = product.name;
    document.getElementById('pm-sku').textContent = product.sku;
    document.getElementById('pm-qty').value = '1';
    document.getElementById('pm-color').value = '';
    document.getElementById('pm-specs').value = '';
    var addBtn = document.getElementById('pm-add-btn');
    addBtn.textContent = '+ Añadir a cotización';
    addBtn.classList.remove('added');

    document.getElementById('product-modal').classList.add('open');
    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeModal = function () {
    document.getElementById('product-modal').classList.remove('open');
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
    modalProduct = null;
  };

  window.modalQty = function (delta) {
    var input = document.getElementById('pm-qty');
    modalQtyVal = Math.max(1, (parseInt(input.value) || 1) + delta);
    input.value = String(modalQtyVal);
  };

  window.confirmAddToCart = function () {
    if (!modalProduct) return;
    modalQtyVal = Math.max(1, parseInt(document.getElementById('pm-qty').value) || 1);
    var color = document.getElementById('pm-color').value.trim();
    var specs = document.getElementById('pm-specs').value.trim();

    var existing = cart.find(function (c) { return c.id === modalProduct.id; });
    if (existing) {
      existing.qty += modalQtyVal;
      if (color) existing.color = color;
      if (specs) existing.specs = specs;
    } else {
      cart.push({
        id: modalProduct.id, category: modalProduct.category,
        name: modalProduct.name, sku: modalProduct.sku, img: modalProduct.img,
        qty: modalQtyVal, color: color, specs: specs
      });
    }
    saveCart();
    updateBadge();

    var addBtn = document.getElementById('pm-add-btn');
    addBtn.textContent = '✓ Añadido a cotización';
    addBtn.classList.add('added');

    document.querySelectorAll('.prod-quote-btn[data-pid="' + modalProduct.id + '"]').forEach(function (btn) {
      btn.textContent = '✓ Agregado'; btn.classList.add('added');
    });

    setTimeout(function () { closeModal(); }, 900);
  };

  // ── Badge ─────────────────────────────────────────────
  function updateBadge() {
    var total = cart.reduce(function (s, c) { return s + c.qty; }, 0);
    var badge = document.getElementById('nav-badge');
    var fabBadge = document.getElementById('fab-badge');
    if (total > 0) {
      badge.textContent = total; badge.classList.add('visible');
      fabBadge.textContent = total; fabBadge.style.display = 'flex';
    } else {
      badge.classList.remove('visible');
      fabBadge.style.display = 'none';
    }
  }

  // ── Category filter ───────────────────────────────────
  window.setCategory = function (slug) {
    state.category = slug;
    state.page = 1;
    document.querySelectorAll('.cat-pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.cat === slug);
    });
    renderCatalog();
  };

  document.getElementById('cat-pills').addEventListener('click', function (e) {
    var pill = e.target.closest('.cat-pill');
    if (pill) setCategory(pill.dataset.cat);
  });

  // ── Search ────────────────────────────────────────────
  var searchTimer;
  function handleSearch(val) {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function () {
      state.search = val.toLowerCase().trim();
      state.page = 1;
      renderCatalog();
    }, 260);
  }
  document.getElementById('cat-search').addEventListener('input', function (e) {
    handleSearch(e.target.value);
  });
  document.getElementById('cat-search').addEventListener('search', function (e) {
    handleSearch(e.target.value);
  });

  window.clearSearch = function () {
    document.getElementById('cat-search').value = '';
    state.search = '';
    state.category = 'todos';
    state.page = 1;
    document.querySelectorAll('.cat-pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.cat === 'todos');
    });
    renderCatalog();
  };

  // ── Init ──────────────────────────────────────────────
  updateBadge();
  renderCatalog();

})();
</script>
</body>
</html>
