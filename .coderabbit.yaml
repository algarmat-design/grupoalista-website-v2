# CodeRabbit AI Code Review Configuration
# https://docs.coderabbit.ai/configuration

language: en

reviews:
  # Enable auto-review on PRs
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Review profile
  profile: assertive

  # Request changes when issues found
  request_changes_workflow: true

  # High-level summary
  high_level_summary: true

  # Review checklist
  review_checklist: true

  # Poem in review (fun touch)
  poem: false

  # Collapse walkthrough
  collapse_walkthrough: false

  # Path-based instructions
  path_instructions:
    - path: "**/*.html"
      instructions: |
        - Check for semantic HTML5 elements
        - Verify all images have alt text
        - Ensure proper heading hierarchy
        - Check for accessibility issues (ARIA labels, roles)
        - Validate external links have rel="noopener noreferrer"

    - path: "**/*.css"
      instructions: |
        - Verify BEM naming convention
        - Check for unused styles
        - Ensure responsive breakpoints are consistent (1024px, 768px, 480px)
        - Look for hardcoded colors (should use CSS custom properties)
        - Check nesting depth (max 4 levels)

    - path: "**/*.js"
      instructions: |
        - Ensure strict equality (=== not ==)
        - No console.log or eval()
        - No innerHTML with user input (XSS risk)
        - Check for proper error handling
        - Verify no ES modules (import/export) in production code

  # Tools to use
  tools:
    htmlhint:
      enabled: true
    stylelint:
      enabled: true
    eslint:
      enabled: true

chat:
  auto_reply: true
